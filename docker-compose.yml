version: "3.9"

# DroidRaksha — Full Stack Docker Compose
# =========================================

services:

  # ── Frontend Web UI ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: droidraksha-frontend
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

  # ── MobSF Static Analyzer ─────────────────────────────────────────────────
  mobsf:
    image: opensecurity/mobile-security-framework-mobsf:latest
    container_name: droidraksha-mobsf
    ports:
      - "8008:8000"
    environment:
      - MOBSF_API_KEY=${MOBSF_API_KEY:-droidraksha}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # ── Redis Broker ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: droidraksha-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── MongoDB (Local Offline Database) ───────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: droidraksha-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── FastAPI Backend ───────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: droidraksha-backend
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./droidraksha.db:/app/droidraksha.db
      - /var/run/docker.sock:/var/run/docker.sock   # Allow sandbox to spawn containers
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite+aiosqlite:///./droidraksha.db}
      - UPLOAD_DIR=./uploads
      - UPLOADS_HOST_PATH=${UPLOADS_HOST_PATH:-./uploads}
      - REDIS_URL=redis://redis:6379/0
      - MOBSF_URL=http://mobsf:8000
      - MOBSF_API_KEY=${MOBSF_API_KEY:-droidraksha}
      - SANDBOX_IMAGE=droidraksha-sandbox:latest
      - SANDBOX_ENABLED=true
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - VIRUSTOTAL_API_KEY=${VIRUSTOTAL_API_KEY}
      - ABUSEIPDB_API_KEY=${ABUSEIPDB_API_KEY}
      - MONGO_URI=mongodb://mongodb:27017/droidraksha
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
    depends_on:
      - redis
      - mobsf
      - mongodb
    restart: unless-stopped

  # ── Celery Worker ─────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: droidraksha-worker
    command: celery -A backend.worker.celery_app worker --loglevel=info -Q analysis -c 2
    volumes:
      - ./uploads:/app/uploads
      - ./droidraksha.db:/app/droidraksha.db
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite+aiosqlite:///./droidraksha.db}
      - UPLOAD_DIR=./uploads
      - UPLOADS_HOST_PATH=${UPLOADS_HOST_PATH:-./uploads}
      - REDIS_URL=redis://redis:6379/0
      - MOBSF_URL=http://mobsf:8000
      - MOBSF_API_KEY=${MOBSF_API_KEY:-droidraksha}
      - SANDBOX_IMAGE=droidraksha-sandbox:latest
      - SANDBOX_ENABLED=true
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - MONGO_URI=mongodb://mongodb:27017/droidraksha
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
    depends_on:
      - redis
      - mobsf
      - mongodb
    restart: unless-stopped

volumes:
  mongo_data:

